name: inputs demo
on:
  workflow_dispatch:
    inputs:
      environment:
        description: chose environment to deploy
        type: choice
        required: true
        default: dev
        options:
          - dev
          - test
          - prod
      artifact_tag:
          description: choose the git tag to deploy
          required: true
jobs:
  inputs-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy the app
        run: echo "deploying this ${{ inputs.artifact_tag }} application to ${{ inputs.environment }}"
